name: Publish Helm Chart (OCI)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify chart version matches tag
        run: |
          chart_version=$(helm show chart . | grep '^version:' | awk '{print $2}')
          if [ "$chart_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: Chart.yaml version ($chart_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Lint chart
        run: helm lint .

      - name: Template chart
        run: helm template test .

      - name: Package chart
        run: helm package . --version "${{ steps.version.outputs.version }}"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        id: push
        run: |
          output=$(helm push glueops-platform-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts 2>&1)
          echo "$output"
          digest=$(echo "$output" | grep -oP 'Digest: \K\S+')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Verify pushed digest
        run: |
          echo "Chart: oci://ghcr.io/${{ github.repository_owner }}/helm-charts/glueops-platform:${{ steps.version.outputs.version }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
          if [ -z "${{ steps.push.outputs.digest }}" ]; then
            echo "ERROR: No digest returned from push — cannot verify artifact integrity"
            exit 1
          fi
          pulled_digest=$(helm pull oci://ghcr.io/${{ github.repository_owner }}/helm-charts/glueops-platform --version "${{ steps.version.outputs.version }}" 2>&1 | grep -oP 'Digest: \K\S+')
          if [ "${{ steps.push.outputs.digest }}" != "$pulled_digest" ]; then
            echo "ERROR: Pushed digest (${{ steps.push.outputs.digest }}) does not match pulled digest ($pulled_digest)"
            exit 1
          fi
          echo "Verified: pushed and pulled digests match"